<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Mask Detector Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        body { background: radial-gradient(circle at top right, #1e293b, #020617); min-height: 100vh; color: white; font-family: 'Inter', sans-serif; }
        .pulse-green { animation: pulse 2s infinite; shadow: 0 0 0 0 rgba(74, 222, 128, 0.7); }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(74, 222, 128, 0); } 100% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0); } }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-4xl font-black bg-gradient-to-r from-cyan-400 to-blue-600 bg-clip-text text-transparent italic">MASK-EYE AI</h1>
                <p class="text-gray-500 font-mono text-sm tracking-widest">ADVANCED ML TEAM 10 // DEPLOYED</p>
            </div>
            <div class="flex gap-3">
                <div class="glass px-4 py-2 rounded-full flex items-center gap-2">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-ping"></span>
                    <span class="text-xs font-bold">SYSTEM ACTIVE</span>
                </div>
            </div>
        </div>

        <div class="grid lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-6">
                <div class="glass rounded-3xl p-6 overflow-hidden relative">
                    <div class="flex gap-4 mb-6">
                        <button id="uploadTab" onclick="switchMode('upload')" class="flex-1 bg-cyan-600 py-3 rounded-xl font-bold transition duration-300 hover:bg-cyan-500">
                            <i class="fas fa-upload mr-2"></i> Upload Image
                        </button>
                        <button id="cameraTab" onclick="switchMode('camera')" class="flex-1 bg-gray-800 py-3 rounded-xl font-bold transition duration-300 hover:bg-cyan-600">
                            <i class="fas fa-video mr-2"></i> Live Camera
                        </button>
                    </div>

                    <div id="uploadView" class="border-2 border-dashed border-gray-700 rounded-2xl p-12 text-center hover:border-cyan-500 transition cursor-pointer" onclick="document.getElementById('fileInput').click()">
                        <i class="fas fa-images text-6xl text-gray-600 mb-4"></i>
                        <p class="text-gray-400">Drag & drop files or browse</p>
                        <input type="file" id="fileInput" class="hidden" accept="image/*">
                    </div>

                    <div id="cameraView" class="hidden relative rounded-2xl overflow-hidden bg-black">
                        <video id="webcam" autoplay playsinline class="w-full h-[400px] object-cover"></video>
                        <div class="absolute top-4 left-4 bg-red-600 px-3 py-1 rounded text-xs font-bold animate-pulse">LIVE FEED</div>
                    </div>

                    <div id="previewContainer" class="hidden mt-6 rounded-2xl overflow-hidden border border-gray-700 relative">
                        <canvas id="previewCanvas" class="w-full h-auto max-h-[500px] block object-contain"></canvas>
                    </div>
                    <canvas id="canvas" class="hidden"></canvas>
                </div>
            </div>

            <div class="space-y-6">
                <div id="resultCard" class="glass rounded-3xl p-8 border-t-4 border-cyan-500 shadow-xl transition-all duration-500 opacity-30">
                    <p class="text-gray-500 text-xs font-black tracking-tighter uppercase mb-2">Detection Result</p>
                    <h2 id="statusText" class="text-5xl font-black mb-2">WAITING...</h2>
                    <p id="actionText" class="text-gray-400 text-sm italic font-medium">Please provide input feed</p>
                    
                    <div class="mt-8">
                        <div class="flex justify-between text-xs mb-2 font-bold">
                            <span>CONFIDENCE</span>
                            <span id="confValue" class="text-cyan-400">0%</span>
                        </div>
                        <div class="w-full bg-gray-800 h-2 rounded-full">
                            <div id="confBar" class="bg-gradient-to-r from-cyan-600 to-blue-400 h-2 rounded-full transition-all duration-700" style="width: 0%"></div>
                        </div>
                    </div>

                    <!-- Faces list -->
                    <div id="facesContainer" class="mt-6 hidden">
                        <p class="text-gray-500 text-xs font-black tracking-tighter uppercase mb-3 text-left">Detected Faces</p>
                        <div id="facesList" class="space-y-2 max-h-[200px] overflow-y-auto pr-1"></div>
                    </div>
                </div>

                <div class="glass rounded-3xl p-6 space-y-4">
                    <h3 class="text-sm font-bold text-gray-400 border-b border-gray-800 pb-2 italic">ANALYSIS STATS</h3>
                    <div class="grid grid-cols-2 gap-4 text-xs">
                        <div class="bg-black/20 p-3 rounded-xl border border-white/5">
                            <p class="text-gray-500 mb-1">Latency</p>
                            <p id="statLatency" class="font-mono text-cyan-400">-- ms</p>
                        </div>
                        <div class="bg-black/20 p-3 rounded-xl border border-white/5">
                            <p class="text-gray-500 mb-1">Resolution</p>
                            <p id="statRes" class="font-mono">--</p>
                        </div>
                        <div class="bg-black/20 p-3 rounded-xl border border-white/5">
                            <p class="text-gray-500 mb-1">Device</p>
                            <p id="statDevice" class="font-mono text-xs uppercase">Connecting...</p>
                        </div>
                        <div class="bg-black/20 p-3 rounded-xl border border-white/5">
                            <p class="text-gray-500 mb-1">Model</p>
                            <p class="font-mono">MobileNetV2</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('canvas');
        const previewCanvas = document.getElementById('previewCanvas');
        let isLive = false;
        let latestFaces = [];
        let renderLoopId = null;
        let isProcessingFrame = false;
        let uploadedImageObject = null;

        async function switchMode(mode) {
            document.getElementById('uploadTab').className = mode === 'upload' ? 'flex-1 bg-cyan-600 py-3 rounded-xl font-bold transition duration-300 hover:bg-cyan-500' : 'flex-1 bg-gray-800 py-3 rounded-xl font-bold transition duration-300 hover:bg-cyan-600';
            document.getElementById('cameraTab').className = mode === 'camera' ? 'flex-1 bg-cyan-600 py-3 rounded-xl font-bold transition duration-300 hover:bg-cyan-500' : 'flex-1 bg-gray-800 py-3 rounded-xl font-bold transition duration-300 hover:bg-cyan-600';
            
            if (mode === 'camera') {
                document.getElementById('uploadView').classList.add('hidden');
                document.getElementById('cameraView').classList.add('hidden'); // keep video tag hidden
                document.getElementById('previewContainer').classList.remove('hidden');
                
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
                    video.srcObject = stream;
                    isLive = true;
                    video.onloadedmetadata = () => {
                        video.play();
                        previewCanvas.width = video.videoWidth || 640;
                        previewCanvas.height = video.videoHeight || 480;
                        renderWebcamLoop();
                        runLiveInference();
                    };
                } catch (err) { 
                    alert("Camera Access Denied or webcam not available"); 
                    console.error(err);
                }
            } else {
                isLive = false;
                if (video.srcObject) {
                    video.srcObject.getTracks().forEach(t => t.stop());
                }
                if (renderLoopId) {
                    cancelAnimationFrame(renderLoopId);
                }
                location.reload(); // Reset for upload mode
            }
        }

        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            const img = new Image();
            img.src = URL.createObjectURL(file);
            img.onload = () => {
                uploadedImageObject = img;
                previewCanvas.width = img.naturalWidth;
                previewCanvas.height = img.naturalHeight;
                const ctx = previewCanvas.getContext('2d');
                ctx.drawImage(img, 0, 0);
                
                document.getElementById('previewContainer').classList.remove('hidden');
                document.getElementById('uploadView').classList.add('hidden');
                
                latestFaces = []; // Reset faces
            };
            
            const formData = new FormData();
            formData.append('file', file);
            performInference(formData);
        };

        function renderWebcamLoop() {
            if (!isLive) return;
            
            const ctx = previewCanvas.getContext('2d');
            if (video.videoWidth > 0) {
                if (previewCanvas.width !== video.videoWidth || previewCanvas.height !== video.videoHeight) {
                    previewCanvas.width = video.videoWidth;
                    previewCanvas.height = video.videoHeight;
                }
                
                // Draw webcam feed
                ctx.drawImage(video, 0, 0, previewCanvas.width, previewCanvas.height);
                
                // Draw face bounding boxes
                drawFaces(ctx, latestFaces, previewCanvas.width);
            }
            
            renderLoopId = requestAnimationFrame(renderWebcamLoop);
        }

        function drawFaces(ctx, faces, width) {
            faces.forEach(face => {
                if (face.bbox) {
                    const bbox = face.bbox;
                    const isMask = face.status === 'mask_on';
                    ctx.strokeStyle = isMask ? '#10B981' : '#EF4444'; // green-500 or red-500
                    ctx.lineWidth = Math.max(3, Math.round(width * 0.005));
                    ctx.strokeRect(bbox.x, bbox.y, bbox.w, bbox.h);
                    
                    // Draw label background
                    ctx.fillStyle = isMask ? '#10B981' : '#EF4444';
                    const fontSize = Math.max(12, Math.round(width * 0.025));
                    ctx.font = `bold ${fontSize}px Inter, sans-serif`;
                    const text = `${face.class === 'WithMask' ? 'Mask' : 'No Mask'} (${(face.confidence * 100).toFixed(0)}%)`;
                    const textWidth = ctx.measureText(text).width;
                    
                    ctx.fillRect(bbox.x - 2, bbox.y - fontSize - 6, textWidth + 10, fontSize + 8);
                    
                    // Draw label text
                    ctx.fillStyle = '#FFFFFF';
                    ctx.fillText(text, bbox.x + 3, bbox.y - 4);
                }
            });
        }

        async function runLiveInference() {
            if (!isLive || isProcessingFrame) return;
            
            isProcessingFrame = true;
            
            // Create a hidden canvas for capturing the current frame
            const capCanvas = document.createElement('canvas');
            capCanvas.width = video.videoWidth || 640;
            capCanvas.height = video.videoHeight || 480;
            const ctx = capCanvas.getContext('2d');
            ctx.drawImage(video, 0, 0);
            
            capCanvas.toBlob(async (blob) => {
                if (blob && isLive) {
                    const formData = new FormData();
                    formData.append('file', blob, 'frame.jpg');
                    
                    const startTime = performance.now();
                    try {
                        const response = await fetch('/predict', { method: 'POST', body: formData });
                        const data = await response.json();
                        const endTime = performance.now();
                        
                        if (isLive) {
                            latestFaces = data.results || [];
                            updateUI(data, Math.round(endTime - startTime));
                        }
                    } catch (err) {
                        console.error("Live inference error:", err);
                    }
                }
                
                isProcessingFrame = false;
                
                if (isLive) {
                    setTimeout(runLiveInference, 300);
                }
            }, 'image/jpeg', 0.8);
        }

        async function performInference(formData) {
            const startTime = performance.now();
            try {
                const response = await fetch('/predict', { method: 'POST', body: formData });
                const data = await response.json();
                const endTime = performance.now();
                
                latestFaces = data.results || [];
                updateUI(data, Math.round(endTime - startTime));
                
                if (uploadedImageObject) {
                    const ctx = previewCanvas.getContext('2d');
                    ctx.drawImage(uploadedImageObject, 0, 0);
                    drawFaces(ctx, latestFaces, previewCanvas.width);
                }
            } catch (err) { 
                console.error(err); 
            }
        }

        function updateUI(data, latency) {
            const card = document.getElementById('resultCard');
            const statusEl = document.getElementById('statusText');
            const facesContainer = document.getElementById('facesContainer');
            const facesList = document.getElementById('facesList');
            
            card.style.opacity = "1";
            
            let overallStatus = 'mask_on';
            let hasFaces = data.results && data.results.length > 0;
            
            if (hasFaces) {
                const anyWithoutMask = data.results.some(f => f.status === 'mask_off');
                overallStatus = anyWithoutMask ? 'mask_off' : 'mask_on';
            } else {
                overallStatus = data.status;
            }
            
            statusEl.innerText = overallStatus === "mask_on" ? "SECURED" : "WARNING";
            statusEl.className = `text-5xl font-black mb-2 ${overallStatus === 'mask_on' ? 'text-green-400' : 'text-red-500'}`;
            
            card.style.borderColor = overallStatus === 'mask_on' ? '#4ade80' : '#ef4444';
            
            if (hasFaces) {
                const anyWithoutMask = data.results.some(f => f.status === 'mask_off');
                document.getElementById('actionText').innerText = anyWithoutMask 
                    ? "Deny entry ❌ — Please wear a mask" 
                    : "Allow entry ✅";
            } else {
                document.getElementById('actionText').innerText = data.action;
            }
            
            const primaryConf = data.confidence;
            document.getElementById('confBar').style.width = (primaryConf * 100) + '%';
            document.getElementById('confValue').innerText = (primaryConf * 100).toFixed(2) + '%';
            
            if (hasFaces) {
                facesContainer.classList.remove('hidden');
                facesList.innerHTML = data.results.map((face, idx) => {
                    const isMask = face.status === 'mask_on';
                    const badgeBg = isMask ? 'bg-green-500/10 border-green-500/30 text-green-400' : 'bg-red-500/10 border-red-500/30 text-red-400';
                    const icon = isMask ? 'fa-circle-check' : 'fa-circle-xmark';
                    return `
                        <div class="flex items-center justify-between p-3 rounded-xl border ${badgeBg} glass">
                            <div class="flex items-center gap-2">
                                <i class="fa-solid ${icon}"></i>
                                <span class="font-bold text-sm">Face #${idx + 1} (${face.class === 'WithMask' ? 'Mask' : 'No Mask'})</span>
                            </div>
                            <span class="font-mono text-xs">${(face.confidence * 100).toFixed(0)}% Conf</span>
                        </div>
                    `;
                }).join('');
            } else {
                facesContainer.classList.add('hidden');
                facesList.innerHTML = '';
            }
            
            if (latency) {
                document.getElementById('statLatency').innerText = latency + " ms";
            }
            document.getElementById('statRes').innerText = `${data.faces_detected || 0} Face(s)`;
        }

        fetch('/health').then(r => r.json()).then(d => {
            document.getElementById('statDevice').innerText = d.device;
        });
    </script>
</body>
</html>
